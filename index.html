<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamFlix - Movie & TV Streaming</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface-hover: #252525;
      --primary: #e50914;
      --primary-glow: #ff3344;
      --secondary: #ffd700;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --border: #333333;
    }

    body {
      font-family: 'Source Sans Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(13,13,13,0.98), rgba(13,13,13,0.9));
      backdrop-filter: blur(10px);
      padding: 1rem 0;
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: 2px;
    }

    .logo span {
      color: var(--text);
    }

    .search-container {
      flex: 1;
      max-width: 600px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      padding-left: 3rem;
      font-size: 1.1rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      outline: none;
      transition: all 0.3s ease;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-icon {
      position: absolute;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .admin-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.3s ease;
    }

    .admin-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .hero {
      position: relative;
      height: 60vh;
      min-height: 400px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

    .hero-backdrop {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      mask-image: linear-gradient(to bottom, transparent 30%, var(--bg));
      -webkit-mask-image: linear-gradient(to bottom, transparent 30%, var(--bg));
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding-bottom: 4rem;
      width: 100%;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
      text-shadow: 0 4px 30px rgba(0,0,0,0.8);
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .rating {
      color: var(--secondary);
      font-weight: 700;
    }

    .section {
      padding: 3rem 0;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.75rem;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 1.5rem;
      background: var(--primary);
      border-radius: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .video-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .video-card:hover {
      transform: scale(1.03);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .video-card-poster {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .video-card-info {
      padding: 1rem;
      background: var(--surface);
    }

    .video-card-title {
      font-weight: 600;
      font-size: 1rem;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .video-card-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .video-card-duration {
      background: rgba(0,0,0,0.8);
      position: absolute;
      bottom: 60px;
      right: 0.5rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .no-poster {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      cursor: pointer;
      transition: all 0.3s ease;
      aspect-ratio: 2/3;
    }

    .card:hover {
      transform: scale(1.05) translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(229, 9, 20, 0.2);
    }

    .card-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-poster {
      transform: scale(1.1);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .card-badge {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: var(--secondary);
      color: #000;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      z-index: 2;
    }

    .card-type {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      background: rgba(0,0,0,0.8);
      color: var(--text);
      font-size: 0.7rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 2;
    }

    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .card:hover .card-info {
      transform: translateY(0);
    }

    .card-title {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-year {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal.active {
      display: flex;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
    }

    .modal-content {
      position: relative;
      background: var(--surface);
      border-radius: 16px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      border: none;
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      background: var(--primary);
    }

    .modal-player-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }

    .modal-player-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .modal-body {
      padding: 1.5rem 2rem 2rem;
    }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 2px;
      margin-bottom: 0.75rem;
    }

    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .modal-meta span {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal-genres {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .genre-tag {
      background: var(--surface-hover);
      padding: 0.375rem 0.875rem;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text);
    }

    .modal-overview {
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .login-content {
      padding: 2rem;
      text-align: center;
      position: relative;
      z-index: 1001;
    }

    .login-content input {
      width: 100%;
      text-align: center;
      margin-bottom: 1rem;
    }

    .btn {
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.875rem;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--text);
    }

    .btn-primary:hover {
      background: var(--primary-glow);
      transform: translateY(-2px);
    }

    .admin-toolbar {
      margin-bottom: 1rem;
      gap: 1rem;
      display: none;
      flex-wrap: wrap;
      align-items: center;
    }

    .admin-toolbar.visible {
      display: flex;
    }

    .admin-toolbar select,
    .admin-toolbar button {
      padding: 0.5rem 1rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
    }

    .admin-toolbar button:hover {
      background: var(--surface-hover);
    }

    .admin-toolbar span {
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-container {
      display: flex;
      justify-content: center;
      padding: 3rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: stretch;
      }

      .hero {
        height: 50vh;
      }

      .modal-player-container {
        aspect-ratio: 16/9;
      }

      .modal-body {
        padding: 1rem;
      }

      .modal-title {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="/" class="logo">STREAM<span>FLIX</span></a>
        <div class="search-container">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search movies, TV shows...">
        </div>
        <button class="admin-btn" id="adminBtn">Admin</button>
      </div>
    </div>
  </header>

  <main id="mainContent">
    <section class="hero" id="heroSection">
      <div class="hero-backdrop" id="heroBackdrop"></div>
      <div class="container hero-content">
        <h1 class="hero-title" id="heroTitle">TRENDING THIS WEEK</h1>
        <div class="hero-meta" id="heroMeta"></div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2 class="section-title" id="resultsTitle">Trending</h2>
        <div class="admin-toolbar" id="adminToolbar">
          <select id="sortSelect">
            <option value="most-popular">Most Popular</option>
            <option value="latest">Latest</option>
            <option value="longest">Longest</option>
            <option value="shortest">Shortest</option>
            <option value="top-rated">Top Rated</option>
            <option value="top-weekly">Top Weekly</option>
            <option value="top-monthly">Top Monthly</option>
          </select>
          <button id="prevPage">Prev</button>
          <span id="pageInfo">Page 1</span>
          <button id="nextPage">Next</button>
        </div>
        <div class="grid" id="resultsGrid"></div>
      </div>
    </section>
  </main>

  <div class="modal" id="loginModal">
    <div class="modal-backdrop" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;"></div>
    <div class="modal-content login-content">
      <button class="modal-close" id="loginClose" style="position:absolute;top:1rem;right:1rem;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"></path>
        </svg>
      </button>
      <h2 class="modal-title">Admin Login</h2>
      <p style="color: var(--text-muted); margin-bottom: 1rem;">Enter password</p>
      <input type="password" class="search-input" id="adminPassword" placeholder="Password">
      <button class="btn btn-primary" id="loginBtn" style="width: 100%;">Login</button>
      <p id="loginError" style="color: var(--primary); margin-top: 1rem; display: none;"></p>
    </div>
  </div>

  <div class="modal" id="detailModal">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"></path>
        </svg>
      </button>
      <div class="modal-player-container" id="playerContainer">
        <iframe id="videoPlayer" src="" allowfullscreen></iframe>
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-genres" id="modalGenres"></div>
        <p class="modal-overview" id="modalOverview"></p>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>StreamFlix</p>
    </div>
  </footer>

  <script>
    const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';
    const TMDB_BACKDROP_BASE = 'https://image.tmdb.org/t/p/original';

    let currentResults = [];
    let debounceTimer = null;

    const searchInput = document.getElementById('searchInput');
    const resultsGrid = document.getElementById('resultsGrid');
    const resultsTitle = document.getElementById('resultsTitle');
    const heroSection = document.getElementById('heroSection');
    const heroBackdrop = document.getElementById('heroBackdrop');
    const heroTitle = document.getElementById('heroTitle');
    const heroMeta = document.getElementById('heroMeta');
    const detailModal = document.getElementById('detailModal');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalClose = document.getElementById('modalClose');
    const modalTitle = document.getElementById('modalTitle');
    const modalMeta = document.getElementById('modalMeta');
    const modalGenres = document.getElementById('modalGenres');
    const modalOverview = document.getElementById('modalOverview');

    const loginModal = document.getElementById('loginModal');
    const adminPassword = document.getElementById('adminPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginClose = document.getElementById('loginClose');
    const loginError = document.getElementById('loginError');
    const adminBtn = document.getElementById('adminBtn');
    const adminToolbar = document.getElementById('adminToolbar');
    const sortSelect = document.getElementById('sortSelect');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');
    const pageInfo = document.getElementById('pageInfo');

    let isAdmin = false;
    let adminToken = '';
    let adminResults = [];
    let adminPage = 1;
    let adminOrder = 'most-popular';
    let totalPages = 1;

    searchInput.addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const query = e.target.value.trim();
        if (query) {
          if (isAdmin) {
            searchAdminContent(query);
          } else {
            searchMedia(query);
          }
        } else {
          if (isAdmin) {
            searchAdminContent('all');
          } else {
            loadStreaming();
          }
        }
      }, 400);
    });

    modalBackdrop.addEventListener('click', closeModal);
    modalClose.addEventListener('click', closeModal);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && detailModal.classList.contains('active')) {
        closeModal();
      }
    });

    async function fetchTMDB(url) {
      try {
        const apiUrl = url.includes('search') 
          ? `/api/search?${url.split('?')[1]}`
          : '/api/trending';
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('API request failed: ' + response.status);
        return await response.json();
      } catch (error) {
        console.error('Fetch error:', error);
        resultsGrid.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M12 8v4M12 16h.01"></path>
            </svg>
            <p>Error: ${error.message}</p>
          </div>
        `;
        return null;
      }
    }

    async function loadStreaming() {
      resultsTitle.textContent = 'Trending This Week';
      heroSection.style.display = 'block';

      const data = await fetchTMDB('/trending/all/week?language=en-US');

      if (data && data.results) {
        currentResults = data.results.filter(r => r.media_type === 'movie' || r.media_type === 'tv');
        displayResults(currentResults);

        const featured = currentResults[0];
        if (featured) {
          heroBackdrop.style.backgroundImage = featured.backdrop_path
            ? `url(${TMDB_BACKDROP_BASE}${featured.backdrop_path})`
            : 'none';
          heroTitle.textContent = featured.title || featured.name || 'Trending';

          const year = (featured.release_date || featured.first_air_date || '').split('-')[0];
          const rating = featured.vote_average?.toFixed(1);
          heroMeta.innerHTML = `
            <span>${featured.media_type === 'tv' ? 'TV Series' : 'Movie'}</span>
            <span>${year || 'N/A'}</span>
            <span class="rating">★ ${rating || 'N/A'}</span>
          `;
        }
      }
    }

    async function searchMedia(query) {
      resultsTitle.textContent = `Search Results for "${query}"`;
      heroSection.style.display = 'none';

      const data = await fetchTMDB(`/search/multi?language=en-US&query=${encodeURIComponent(query)}`);

      if (data && data.results) {
        currentResults = data.results.filter(r =>
          (r.media_type === 'movie' || r.media_type === 'tv') &&
          r.poster_path
        );
        displayResults(currentResults);
      }
    }

    function displayResults(results) {
      if (!results.length) {
        resultsGrid.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M12 8v4M12 16h.01"></path>
            </svg>
            <p>No results found</p>
          </div>
        `;
        return;
      }

      resultsGrid.innerHTML = results.map(media => createCard(media)).join('');

      resultsGrid.querySelectorAll('.card').forEach((card, index) => {
        card.addEventListener('click', () => openDetail(currentResults[index]));
      });
    }

    function createCard(media) {
      const posterUrl = media.poster_path
        ? `${TMDB_IMAGE_BASE}${media.poster_path}`
        : null;
      const title = media.title || media.name || 'Unknown';
      const year = (media.release_date || media.first_air_date || '').split('-')[0];
      const rating = media.vote_average?.toFixed(1);
      const mediaType = media.media_type === 'tv' ? 'TV' : 'Movie';

      return `
        <div class="card">
          ${posterUrl
            ? `<img class="card-poster" src="${posterUrl}" alt="${title}" loading="lazy">`
            : `<div class="no-poster"><span>No Image</span></div>`
          }
          <div class="card-overlay"></div>
          <span class="card-badge">★ ${rating || 'N/A'}</span>
          <span class="card-type">${mediaType}</span>
          <div class="card-info">
            <div class="card-title">${title}</div>
            <div class="card-year">${year || 'N/A'}</div>
          </div>
        </div>
      `;
    }

    function openDetail(media) {
      const title = media.title || media.name || 'Unknown';
      const year = (media.release_date || media.first_air_date || '').split('-')[0];
      const rating = media.vote_average?.toFixed(1);
      const mediaType = media.media_type === 'tv' ? 'TV Series' : 'Movie';

      const vidkingUrl = media.media_type === 'tv'
        ? `https://www.vidking.net/embed/tv/${media.id}/1/1`
        : `https://www.vidking.net/embed/movie/${media.id}`;

      document.getElementById('videoPlayer').src = vidkingUrl;

      modalTitle.textContent = title;
      modalMeta.innerHTML = `
        <span>${mediaType}</span>
        <span>${year || 'N/A'}</span>
        <span class="rating">★ ${rating || 'N/A'}</span>
      `;

      modalGenres.innerHTML = '';

      if (media.genre_ids?.length) {
        const genreMap = {
          28: 'Action', 12: 'Adventure', 16: 'Animation', 35: 'Comedy',
          80: 'Crime', 99: 'Documentary', 18: 'Drama', 10751: 'Family',
          14: 'Fantasy', 36: 'History', 27: 'Horror', 10402: 'Music',
          9648: 'Mystery', 10749: 'Romance', 878: 'Sci-Fi', 10770: 'TV Movie',
          53: 'Thriller', 10752: 'War', 37: 'Western'
        };
        modalGenres.innerHTML = media.genre_ids.slice(0, 4).map(id =>
          `<span class="genre-tag">${genreMap[id] || 'Genre'}</span>`
        ).join('');
      }

      modalOverview.textContent = media.overview || 'No description available.';

      detailModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      detailModal.classList.remove('active');
      document.body.style.overflow = '';
      document.getElementById('videoPlayer').src = '';
    }

    adminBtn.addEventListener('click', () => {
      loginModal.classList.add('active');
      adminPassword.value = '';
      loginError.style.display = 'none';
    });

    loginClose.addEventListener('click', () => loginModal.classList.remove('active'));
    loginBtn.addEventListener('click', login);

    adminPassword.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const password = adminPassword.value;
      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await response.json();
        if (data.authenticated) {
          isAdmin = true;
          adminToken = password;
          loginModal.classList.remove('active');
          showAdminSection();
        } else {
          loginError.textContent = data.error || 'Invalid password';
          loginError.style.display = 'block';
        }
      } catch (err) {
        loginError.textContent = 'Error: ' + err.message;
        loginError.style.display = 'block';
      }
    }

    async function showAdminSection() {
      adminPage = 1;
      resultsTitle.textContent = 'Admin Content';
      heroSection.style.display = 'none';
      adminToolbar.classList.add('visible');
      searchInput.placeholder = 'Search videos...';
      await searchAdminContent('all');
    }

    sortSelect.addEventListener('change', async () => {
      adminOrder = sortSelect.value;
      adminPage = 1;
      const query = searchInput.value.trim() || 'all';
      await searchAdminContent(query);
    });

    nextPage.addEventListener('click', async () => {
      if (adminPage < totalPages) {
        adminPage++;
        const query = searchInput.value.trim() || 'all';
        await searchAdminContent(query);
      }
    });

    prevPage.addEventListener('click', async () => {
      if (adminPage > 1) {
        adminPage--;
        const query = searchInput.value.trim() || 'all';
        await searchAdminContent(query);
      }
    });

    async function searchAdminContent(query) {
      try {
        const response = await fetch(`/api/admin/search?q=${encodeURIComponent(query)}&page=${adminPage}&order=${adminOrder}`, {
          headers: { 'Authorization': adminToken }
        });
        if (!response.ok) throw new Error('Search failed: ' + response.status);
        const data = await response.json();
        adminResults = data.videos || data.movies || [];
        totalPages = data.total_pages || 1;
        displayAdminResults(adminResults);
        pageInfo.textContent = `Page ${adminPage} of ${totalPages}`;
      } catch (err) {
        console.error('Admin search error:', err);
        resultsGrid.innerHTML = `<div class="empty-state"><p>Error: ${err.message}</p></div>`;
      }
    }

    function displayAdminResults(results) {
      if (!results || results.length === 0) {
        resultsGrid.innerHTML = '<div class="empty-state"><p>No results found</p></div>';
        return;
      }
      resultsGrid.innerHTML = results.map(video => createVideoCard(video)).join('');
      resultsGrid.querySelectorAll('.video-card').forEach((card, index) => {
        card.addEventListener('click', () => playVideo(results[index]));
      });
    }

    function createVideoCard(video) {
      const title = video.title || 'Untitled';
      const thumbs = video.thumbs || [];
      const image = thumbs.length > 0 ? thumbs[thumbs.length - 1].src : '';
      const duration = video.duration ? formatDuration(video.duration) : '';

      return `
        <div class="video-card">
          ${image 
            ? `<img class="video-card-poster" src="${image}" alt="${title}" loading="lazy">` 
            : `<div class="no-poster"><span>No Image</span></div>`
          }
          ${duration ? `<span class="video-card-duration">${duration}</span>` : ''}
          <div class="video-card-info">
            <div class="video-card-title">${title}</div>
            <div class="video-card-meta">
              ${video.rating ? `<span>★ ${video.rating.toFixed(1)}%</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function formatDuration(seconds) {
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      if (hrs > 0) {
        return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function playVideo(video) {
      if (video.embed) {
        document.getElementById('videoPlayer').src = video.embed;
        modalTitle.textContent = video.title || '';
        modalMeta.innerHTML = video.duration ? `<span>${formatDuration(video.duration)}</span>` : '';
        modalGenres.innerHTML = '';
        modalOverview.textContent = video.description || '';
        detailModal.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
    }

    loadStreaming();
  </script>
</body>
</html>
