<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <title>StreamFlix</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:#0a0a0f}
    #splash{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
    #splash.hide{opacity:0;pointer-events:none}
    .logo{color:#c8ff00;font-size:36px;font-weight:900;letter-spacing:-1px}
    .sub{color:#555;font-size:11px;margin-top:6px;text-transform:uppercase;letter-spacing:2px}
    .loader{margin-top:28px;display:flex;align-items:center;gap:10px}
    .spinner{width:20px;height:20px;border:2px solid #222;border-top-color:#c8ff00;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .stxt{color:#666;font-size:12px}
    #errWrap{display:none;position:fixed;inset:0;background:#0a0a0f;flex-direction:column;align-items:center;justify-content:center;z-index:10000;color:#fff}
    #errWrap h2{color:#c8ff00;margin-bottom:10px;font-size:20px}
    #errWrap p{color:#777;font-size:13px;text-align:center;margin-bottom:20px;line-height:1.6}
    #retryBtn{background:#c8ff00;color:#000;border:none;padding:10px 28px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}
    #appFrame{position:fixed;inset:0;width:100%;height:100%;border:none;z-index:1;background:#0a0a0f}
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo">StreamFlix</div>
    <div class="sub">Premium Cinema</div>
    <div class="loader">
      <div class="spinner"></div>
      <div class="stxt" id="stxt">Loading...</div>
    </div>
  </div>
  <div id="errWrap">
    <h2>Connection Error</h2>
    <p>Could not reach the server.<br>Check your internet and try again.</p>
    <button id="retryBtn">Retry</button>
  </div>
  <iframe id="appFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox" allow="autoplay; fullscreen; encrypted-media"></iframe>
  <script>
    var SERVER = 'https://streamflix.kamalparajuli.com.np/';
    var splash = document.getElementById('splash');
    var errWrap = document.getElementById('errWrap');
    var frame = document.getElementById('appFrame');
    var stxt = document.getElementById('stxt');
    var tries = 0;

    function go() {
      tries++;
      stxt.textContent = 'Loading... (attempt ' + tries + ')';
      errWrap.style.display = 'none';
      splash.classList.remove('hide');

      var loadTimer = setTimeout(function() {
        if (tries < 4) go();
        else showError();
      }, 15000);

      frame.onload = function() {
        clearTimeout(loadTimer);
        splash.classList.add('hide');
      };

      frame.onerror = function() {
        clearTimeout(loadTimer);
        if (tries < 4) setTimeout(go, 2000);
        else showError();
      };

      frame.src = SERVER;
    }

    function showError() {
      splash.classList.add('hide');
      errWrap.style.display = 'flex';
    }

    document.getElementById('retryBtn').onclick = function() { tries = 0; go(); };
    go();
  </script>
</body>
</html>
