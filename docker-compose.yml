version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://streamflix:streamflix@db:5432/streamflix
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=streamflix
      - POSTGRES_PASSWORD=streamflix
      - POSTGRES_DB=streamflix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamflix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
