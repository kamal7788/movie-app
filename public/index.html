<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#141414">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>StreamFlix</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>

  <!-- AUTH SCREENS -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-box">
      <h1 class="auth-logo">STREAMFLIX</h1>
      <div id="authLoginForm">
        <h2>Sign In</h2>
        <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
        <button class="auth-btn" id="loginBtn">Sign In</button>
        <p class="auth-switch">New here? <a id="showRegister">Create account</a></p>
        <p class="auth-error" id="loginError"></p>
      </div>
      <div id="authRegisterForm" style="display:none">
        <h2>Create Account</h2>
        <input type="text" id="regUsername" placeholder="Username" autocomplete="username">
        <input type="email" id="regEmail" placeholder="Email" autocomplete="email">
        <input type="password" id="regPassword" placeholder="Password (min 6 chars)" autocomplete="new-password">
        <button class="auth-btn" id="registerBtn">Create Account</button>
        <p class="auth-switch">Already have an account? <a id="showLogin">Sign in</a></p>
        <p class="auth-error" id="registerError"></p>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" style="display:none">
    <nav class="navbar" id="navbar">
      <div class="nav-left">
        <button class="nav-back" id="backBtn" style="display:none">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="logo" id="logoBtn">STREAMFLIX</h1>
      </div>
      <div class="nav-center">
        <button class="nav-tab active" data-view="home">Home</button>
        <button class="nav-tab" data-view="movies">Movies</button>
        <button class="nav-tab" data-view="series">TV Series</button>
        <button class="nav-tab" data-view="mylist">My List</button>
      </div>
      <div class="nav-right">
        <div class="search-box" id="searchBox">
          <input type="text" id="searchInput" placeholder="Search..." autocomplete="off">
          <button id="searchBtn" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          </button>
          <button id="searchClose" style="display:none">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="user-menu" id="userMenu">
          <button class="user-avatar" id="userAvatarBtn"></button>
          <div class="user-dropdown" id="userDropdown">
            <div class="dropdown-item" id="profileBtn">Profile</div>
            <div class="dropdown-item" id="logoutBtn">Sign Out</div>
          </div>
        </div>
      </div>
    </nav>

    <main id="mainContent">
      <!-- HOME -->
      <div class="view active" id="homeView">
        <div class="hero" id="hero"></div>
        <div class="content-sections" id="homeSections"></div>
      </div>

      <!-- BROWSE -->
      <div class="view" id="browseView">
        <div class="browse-filters" id="browseFilters">
          <div class="filter-row" id="filterRow"></div>
        </div>
        <div class="browse-grid" id="browseGrid"></div>
        <div class="load-more" id="loadMore" style="display:none">
          <button id="loadMoreBtn">Load More</button>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="view" id="searchView">
        <div class="browse-header"><h2 id="searchTitle">Search Results</h2></div>
        <div class="browse-grid" id="searchGrid"></div>
      </div>

      <!-- MY LIST -->
      <div class="view" id="mylistView">
        <div class="browse-header"><h2>My List</h2></div>
        <div class="mylist-tabs">
          <button class="mylist-tab active" data-tab="favorites">Favorites</button>
          <button class="mylist-tab" data-tab="watchlist">Watchlist</button>
          <button class="mylist-tab" data-tab="continue">Continue Watching</button>
        </div>
        <div class="browse-grid" id="mylistGrid"></div>
      </div>

      <!-- DETAIL -->
      <div class="view" id="detailView">
        <div class="detail-hero" id="detailHero"></div>
        <div class="detail-info" id="detailInfo"></div>
        <div class="detail-seasons" id="detailSeasons" style="display:none"></div>
      </div>

      <!-- PLAYER -->
      <div class="view" id="playerView">
        <div class="player-container">
          <div class="player-header">
            <button class="player-back" id="playerBack">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span class="player-title" id="playerTitle"></span>
          </div>
          <div class="player-wrapper">
            <iframe id="playerFrame" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
          </div>
          <div class="player-controls-info" id="playerControls"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="loading-spinner" id="loadingSpinner"><div class="spinner"></div></div>

  <script src="js/app.js"></script>
</body>
</html>
